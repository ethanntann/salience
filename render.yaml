services:
  - type: web
    name: salience-demo
    runtime: docker
    plan: free
    branch: main
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: SALIENCE_DEMO_MODE
        value: "true"
      - key: SALIENCE_VLM_PROVIDER
        value: local
      - key: SALIENCE_LOCAL_OCR_ENABLED
        value: "true"
      - key: SALIENCE_APP_DATA_DIR
        value: /tmp/salience
      - key: SALIENCE_STUDENT_ARTIFACTS_DIR
        value: /app/student-artifacts
