<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#101a33"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#39d0ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2440"/>
      <stop offset="1" stop-color="#141c33"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1620" cy="140" r="420" fill="#7c5cff" opacity="0.08"/>
  <circle cx="240" cy="980" r="380" fill="#39d0ff" opacity="0.07"/>

  <!-- Wordmark -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="150" y="196" width="64" height="64" rx="16" fill="url(#accent)"/>
    <path d="M166 238 L182 210 L191 226 L202 208" stroke="#0b1020" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="238" y="248" font-size="64" font-weight="700" fill="#f4f6ff" letter-spacing="1">Salience</text>

    <text x="150" y="392" font-size="86" font-weight="800" fill="#f4f6ff">Personalized Fortnite</text>
    <text x="150" y="492" font-size="86" font-weight="800" fill="#f4f6ff">highlights, <tspan fill="#39d0ff">ranked locally</tspan>.</text>

    <text x="150" y="580" font-size="34" fill="#9fb0d8">Cloud VLM teacher &#8594; tiny on-device student model.</text>
    <text x="150" y="630" font-size="34" fill="#9fb0d8">Your clips never leave your PC.</text>

    <!-- Pipeline chips -->
    <g font-size="27" font-weight="600">
      <rect x="150" y="700" width="250" height="58" rx="29" fill="#1a2440" stroke="#2b3a63"/>
      <text x="275" y="737" fill="#cfd9f5" text-anchor="middle">VLM teacher</text>
      <text x="424" y="737" fill="#5b6c96" font-size="30">&#8594;</text>
      <rect x="462" y="700" width="270" height="58" rx="29" fill="#1a2440" stroke="#2b3a63"/>
      <text x="597" y="737" fill="#cfd9f5" text-anchor="middle">ONNX student</text>
      <text x="756" y="737" fill="#5b6c96" font-size="30">&#8594;</text>
      <rect x="794" y="700" width="290" height="58" rx="29" fill="#1a2440" stroke="#2b3a63"/>
      <text x="939" y="737" fill="#cfd9f5" text-anchor="middle">personal ranker</text>
    </g>

    <text x="150" y="860" font-size="28" fill="#68779f">local-first &#183; CPU-only inference &#183; learns your taste from feedback</text>

    <!-- Ranked clip cards -->
    <g>
      <rect x="1210" y="300" width="560" height="150" rx="20" fill="url(#card)" stroke="#2b3a63" stroke-width="2"/>
      <rect x="1234" y="326" width="176" height="98" rx="12" fill="#0e1526"/>
      <path d="M1300 356 L1300 394 L1334 375 Z" fill="#39d0ff"/>
      <text x="1434" y="362" font-size="30" font-weight="700" fill="#f4f6ff">one-pump &#183; victory</text>
      <text x="1434" y="404" font-size="26" fill="#9fb0d8">#1 &#183; score 94 &#183; strong</text>
      <rect x="1650" y="322" width="96" height="44" rx="22" fill="url(#accent)"/>
      <text x="1698" y="352" font-size="26" font-weight="700" fill="#0b1020" text-anchor="middle">94</text>

      <rect x="1210" y="480" width="560" height="150" rx="20" fill="url(#card)" stroke="#2b3a63" stroke-width="2" opacity="0.85"/>
      <rect x="1234" y="506" width="176" height="98" rx="12" fill="#0e1526"/>
      <path d="M1300 536 L1300 574 L1334 555 Z" fill="#7c5cff"/>
      <text x="1434" y="542" font-size="30" font-weight="700" fill="#f4f6ff">sniper elimination</text>
      <text x="1434" y="584" font-size="26" fill="#9fb0d8">#2 &#183; score 88 &#183; strong</text>
      <rect x="1650" y="502" width="96" height="44" rx="22" fill="#233052"/>
      <text x="1698" y="532" font-size="26" font-weight="700" fill="#cfd9f5" text-anchor="middle">88</text>

      <rect x="1210" y="660" width="560" height="150" rx="20" fill="url(#card)" stroke="#2b3a63" stroke-width="2" opacity="0.6"/>
      <rect x="1234" y="686" width="176" height="98" rx="12" fill="#0e1526"/>
      <path d="M1300 716 L1300 754 L1334 735 Z" fill="#5b6c96"/>
      <text x="1434" y="722" font-size="30" font-weight="700" fill="#cfd9f5">cleanup kill</text>
      <text x="1434" y="764" font-size="26" fill="#68779f">#41 &#183; score 32 &#183; low</text>
      <rect x="1650" y="682" width="96" height="44" rx="22" fill="#233052"/>
      <text x="1698" y="712" font-size="26" font-weight="700" fill="#9fb0d8" text-anchor="middle">32</text>
    </g>
  </g>
</svg>
